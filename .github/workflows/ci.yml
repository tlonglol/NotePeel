name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-lint:
    name: Backend Lint & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics --exit-zero

      - name: Check imports
        run: |
          cd backend
          python -c "import main; print('Backend imports OK')"
        env:
          DATABASE_URL: "sqlite:///test.db"
          GEMINI_API_KEY: "test"
          R2_ENDPOINT: "test"
          R2_ACCESS_KEY_ID: "test"
          R2_SECRET_ACCESS_KEY: "test"
          R2_BUCKET_NAME: "test"
          CF_ACCOUNT_ID: "test"
          CF_API_TOKEN: "test"

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t notepeel-backend ./backend

      - name: Build frontend image
        run: docker build -t notepeel-frontend ./frontend
